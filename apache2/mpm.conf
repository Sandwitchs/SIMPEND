# Disable conflicting MPM modules
<IfModule mpm_worker_module>
  # Disable worker MPM
</IfModule>

<IfModule mpm_event_module>
  # Disable event MPM
</IfModule>

# Keep only prefork MPM
<IfModule mpm_prefork_module>
  StartServers 8
  MinSpareServers 5
  MaxSpareServers 20
  MaxRequestWorkers 256
  MaxConnectionsPerChild 0
</IfModule>
